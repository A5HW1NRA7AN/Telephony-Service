server:
  port: 8080

spring:
  application:
    name: event-publisher

telephony:
  esl:
    outbound-host: 0.0.0.0
    outbound-port: 8084
  lead-service:
    url: ${LEAD_SERVICE_URL:http://lead-service:8080}
    max-retries: ${LEAD_SERVICE_MAX_RETRIES:3}
    retry-delay-ms: ${LEAD_SERVICE_RETRY_DELAY_MS:1000}

logging:
  level:
    root: INFO
    com.telephony.event: DEBUG
