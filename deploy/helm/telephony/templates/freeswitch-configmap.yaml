apiVersion: v1
kind: ConfigMap
metadata:
  name: freeswitch-config
  namespace: {{ .Release.Namespace }}
data:
  freeswitch.xml: |
    <?xml version="1.0" encoding="utf-8"?>
    <document type="freeswitch/xml">
      <!-- Global Variables -->
      <X-PRE-PROCESS cmd="set" data="domain=localhost"/>
      <X-PRE-PROCESS cmd="set" data="console_loglevel=info"/>

      <!-- CONFIGURATIONS SECTION -->
      <section name="configuration" description="Various Configuration">
        
        <!-- Console Logging -->
        <configuration name="console.conf" description="Console Logger">
          <mappings>
            <map name="all" value="console,info,notice,warn,err,crit,alert"/>
          </mappings>
        </configuration>

        <!-- Event Socket Library (ESL) Configuration -->
        <configuration name="event_socket.conf" description="Event Socket Client">
          <settings>
            <param name="listen-ip" value="127.0.0.1"/>
            <param name="listen-port" value="8021"/>
            <param name="password" value="CluSt3r@Esl#2026!"/>
          </settings>
        </configuration>

        <!-- Core Modules to Load -->
        <configuration name="modules.conf" description="Modules">
          <modules>
            <load module="mod_console"/>
            <load module="mod_logfile"/>
            <load module="mod_commands"/>
            <load module="mod_dptools"/>
            <load module="mod_dialplan_xml"/>
            <load module="mod_sofia"/>
            <load module="mod_sndfile"/>
            <load module="mod_shout"/>
            <load module="mod_loopback"/>
            <load module="mod_event_socket"/>
          </modules>
        </configuration>

        <!-- Logfile Logger -->
        <configuration name="logfile.conf" description="File Logger">
          <settings>
            <param name="rotate-on-hup" value="true"/>
          </settings>
          <profiles>
            <profile name="default">
              <settings>
                <param name="logfile" value="/var/log/freeswitch/freeswitch.log"/>
                <param name="level" value="debug"/>
              </settings>
              <mappings>
                <map name="all" value="debug,info,notice,warn,err,crit,alert"/>
              </mappings>
            </profile>
          </profiles>
        </configuration>

        <!-- Sofia SIP Configuration -->
        <configuration name="sofia.conf" description="Sofia SIP Endpoint">
          <global_settings>
            <param name="log-level" value="0"/>
            <param name="tracelevel" value="0"/>
          </global_settings>
          <profiles>
            <!-- External Profile for Twilio Trunk Ingress -->
            <profile name="external">
              <settings>
                <param name="NDLB-force-rport" value="true"/>
                <param name="debug" value="0"/>
                <param name="sip-trace" value="no"/>
                <param name="context" value="public"/>
                <param name="rfc2833-pt" value="101"/>
                <param name="sip-port" value="5060"/>
                <param name="dialplan" value="XML"/>
                <param name="dtmf-duration" value="2000"/>
                <param name="codec-prefs" value="PCMU,PCMA"/>
                <param name="use-rtp-timer" value="true"/>
                <param name="rtp-timer-name" value="soft"/>
                <param name="rtp-ip" value="$${local_ip_v4}"/>
                <param name="sip-ip" value="$${local_ip_v4}"/>
                <param name="ext-rtp-ip" value="{{ .Values.freeswitch.extIp }}"/>
                <param name="ext-sip-ip" value="{{ .Values.freeswitch.extIp }}"/>
                <param name="rtp-start-port" value="16384"/>
                <param name="rtp-end-port" value="16484"/>
                <param name="rtp-timeout-sec" value="300"/>
                <param name="rtp-hold-timeout-sec" value="1800"/>
                <param name="challenge-realm" value="auto_to_local"/>
              </settings>
            </profile>
          </profiles>
        </configuration>
      </section>

      <!-- DIALPLAN SECTION -->
      <section name="dialplan" description="Regex Routing Table">
        <context name="public">
          <!-- Inbound entry point: Language Selection Menu -->
          <extension name="inbound_sip">
            <condition field="destination_number" expression="^.*$">
              <action application="answer"/>
              <action application="log" data="INFO Incoming call from ${caller_id_number} to ${destination_number}"/>
              
              <!-- Collect Language choice (1=EN, 2=AM) -->
              <action application="play_and_get_digits" data="1 1 3 5000 # /usr/share/freeswitch/sounds/custom/lang_select.wav /usr/share/freeswitch/sounds/custom/lang_invalid.wav ivr_language ^[12]$"/>
              <action application="execute_extension" data="ivr_lang_branch_${ivr_language}"/>
            </condition>
          </extension>

          <!-- Language Selection branch fallback (timeout or invalid key after 3 attempts) -->
          <extension name="ivr_lang_branch_">
            <condition field="destination_number" expression="^ivr_lang_branch_$">
              <action application="set" data="ivr_lang=UNKNOWN"/>
              <action application="set" data="ivr_result=TIMEOUT"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/en_goodbye.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- Language Branch 1: English -->
          <extension name="ivr_lang_branch_1">
            <condition field="destination_number" expression="^ivr_lang_branch_1$">
              <action application="set" data="ivr_lang=EN"/>
              <!-- Prompt for Credit Access (English) -->
              <action application="play_and_get_digits" data="1 1 3 5000 # /usr/share/freeswitch/sounds/custom/en_credit_menu.wav /usr/share/freeswitch/sounds/custom/en_invalid_entry.wav ivr_selection ^[12]$"/>
              <action application="execute_extension" data="ivr_en_branch_${ivr_selection}"/>
            </condition>
          </extension>

          <!-- Language Branch 2: Amharic -->
          <extension name="ivr_lang_branch_2">
            <condition field="destination_number" expression="^ivr_lang_branch_2$">
              <action application="set" data="ivr_lang=AM"/>
              <!-- Prompt for Credit Access (Amharic) -->
              <action application="play_and_get_digits" data="1 1 3 5000 # /usr/share/freeswitch/sounds/custom/am_credit_menu.wav /usr/share/freeswitch/sounds/custom/am_invalid_entry.wav ivr_selection ^[12]$"/>
              <action application="execute_extension" data="ivr_am_branch_${ivr_selection}"/>
            </condition>
          </extension>

          <!-- English Branch 1: Accept -->
          <extension name="ivr_en_branch_1">
            <condition field="destination_number" expression="^ivr_en_branch_1$">
              <action application="set" data="ivr_result=ACCEPT"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/en_confirm_accept.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- English Branch 2: Decline -->
          <extension name="ivr_en_branch_2">
            <condition field="destination_number" expression="^ivr_en_branch_2$">
              <action application="set" data="ivr_result=DECLINE"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/en_confirm_decline.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- English Branch Fallback: Timeout/Invalid -->
          <extension name="ivr_en_branch_">
            <condition field="destination_number" expression="^ivr_en_branch_$">
              <action application="set" data="ivr_result=TIMEOUT"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/en_goodbye.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- Amharic Branch 1: Accept -->
          <extension name="ivr_am_branch_1">
            <condition field="destination_number" expression="^ivr_am_branch_1$">
              <action application="set" data="ivr_result=ACCEPT"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/am_confirm_accept.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- Amharic Branch 2: Decline -->
          <extension name="ivr_am_branch_2">
            <condition field="destination_number" expression="^ivr_am_branch_2$">
              <action application="set" data="ivr_result=DECLINE"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/am_confirm_decline.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- Amharic Branch Fallback: Timeout/Invalid -->
          <extension name="ivr_am_branch_">
            <condition field="destination_number" expression="^ivr_am_branch_$">
              <action application="set" data="ivr_result=TIMEOUT"/>
              <action application="playback" data="/usr/share/freeswitch/sounds/custom/am_goodbye.wav"/>
              <action application="execute_extension" data="ivr_socket_connect"/>
            </condition>
          </extension>

          <!-- Establish ESL Socket Connection -->
          <extension name="ivr_socket_connect">
            <condition field="destination_number" expression="^ivr_socket_connect$">
              <action application="socket" data="event-publisher-service.{{ .Release.Namespace }}.svc.cluster.local:8084 async full"/>
              <action application="hangup"/>
            </condition>
          </extension>
        </context>
      </section>

      <!-- DIRECTORY SECTION -->
      <section name="directory" description="User Directory">
        <domain name="$${domain}">
          <params>
            <param name="dial-string" value="{presence_id=${dialed_user}@${dialed_domain}}${sofia_contact(${dialed_user}@${dialed_domain})}"/>
          </params>
        </domain>
      </section>
    </document>
