apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
data:
  # Base64 encoded values for:
  # POSTGRES_DB: lead_db (bGVhZF9kYg==)
  # POSTGRES_USER: lead_user (bGVhZF91c2Vy)
  # POSTGRES_PASSWORD: lead_password (bGVhZF9wYXNzd29yZA==)
  postgres-db: bGVhZF9kYg==
  postgres-user: bGVhZF91c2Vy
  postgres-password: bGVhZF9wYXNzd29yZA==
