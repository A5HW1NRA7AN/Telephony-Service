version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telephony-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lead_db}
      POSTGRES_USER: ${POSTGRES_USER:-lead_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - telephony-net
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: telephony-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - telephony-net
    depends_on:
      - postgres
    restart: always

  event-publisher:
    image: ${ECR_REGISTRY:-379220350808.dkr.ecr.ap-northeast-1.amazonaws.com}/${ECR_REPOSITORY_EVENT_PUBLISHER:-freeswitch-event-publisher-ec2}:${IMAGE_TAG:-latest}
    build:
      context: ./service/event-publisher
      dockerfile: Dockerfile
    container_name: telephony-event-publisher
    ports:
      - "8084:8084" # ESL Outbound Socket port
      - "8081:8080" # Management HTTP port
    environment:
      LEAD_SERVICE_URL: http://lead-service:8080
      LEAD_SERVICE_MAX_RETRIES: 3
    networks:
      - telephony-net
    depends_on:
      - lead-service
    restart: always

  lead-service:
    image: ${ECR_REGISTRY:-379220350808.dkr.ecr.ap-northeast-1.amazonaws.com}/${ECR_REPOSITORY_LEAD_SERVICE:-freeswitch-lead-service-ec2}:${IMAGE_TAG:-latest}
    build:
      context: ./service/lead-service
      dockerfile: Dockerfile
    container_name: telephony-lead-service
    ports:
      - "8080:8080" # Exposed for Nginx proxy routing
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lead_db}
      DB_USER: ${POSTGRES_USER:-lead_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-lead_password}
      AMI_ENABLED: "false"
      LEAD_CONTEXT: ${LEAD_CONTEXT:-public,from-missed-call}
      LEAD_REGISTRY_URL: ${LEAD_REGISTRY_URL}
      LEAD_REGISTRY_API_KEY_HEADER: ${LEAD_REGISTRY_API_KEY_HEADER}
      LEAD_REGISTRY_API_KEY_VALUE: ${LEAD_REGISTRY_API_KEY_VALUE}
    networks:
      - telephony-net
    depends_on:
      - postgres
    restart: always

  freeswitch:
    image: ${ECR_REGISTRY:-379220350808.dkr.ecr.ap-northeast-1.amazonaws.com}/${ECR_REPOSITORY_FREESWITCH:-freeswitch-freeswitch-ec2}:${IMAGE_TAG:-latest}
    build:
      context: ./infra/freeswitch # Wait! EKS Dockerfile is now in infra/freeswitch
      dockerfile: Dockerfile
    container_name: telephony-freeswitch
    network_mode: "host"
    environment:
      - EXTERNAL_IP=${EXTERNAL_IP}
    volumes:
      - ./config/freeswitch.xml:/etc/freeswitch/freeswitch.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "fs_cli -p CluSt3r@Esl#2026! -x status | grep -q ^UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

volumes:
  postgres_data:
  pgadmin_data:

networks:
  telephony-net:
    driver: bridge
