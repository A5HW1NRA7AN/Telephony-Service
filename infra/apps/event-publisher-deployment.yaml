apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-publisher
  namespace: default
  labels:
    app: event-publisher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-publisher
  template:
    metadata:
      labels:
        app: event-publisher
    spec:
      containers:
      - name: event-publisher
        image: 379220350808.dkr.ecr.ap-northeast-1.amazonaws.com/freeswitch-event-publisher:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8084
          name: esl-socket
        env:
        - name: LEAD_SERVICE_URL
          value: "http://lead-service:8080"
        - name: LEAD_SERVICE_MAX_RETRIES
          value: "3"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
