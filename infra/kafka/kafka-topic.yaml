apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: telephony-call-events
  namespace: default
  labels:
    strimzi.io/cluster: telephony-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000 # 7 days retention
    segment.bytes: 1073741824 # 1 GB segments
